<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" font-family="Inter, -apple-system, sans-serif">
  <style>
    .bob { animation: bob 3.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .bob2 { animation: bob 4.4s ease-in-out 0.8s infinite; transform-box: fill-box; transform-origin: center; }
    .glowpulse { animation: gp 2.4s ease-in-out infinite; }
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes gp { 0%,100% { opacity: 0.35; } 50% { opacity: 0.9; } }
  </style>
  <rect width="760" height="560" fill="#FDFAF5"/>

  <!-- ranking article -->
  <rect x="90" y="60" width="580" height="440" rx="18" fill="#FFFFFF" stroke="#EAE0D2"/>
  <rect x="126" y="96" width="120" height="26" rx="13" fill="#E5F7F1"/>
  <text x="142" y="114" font-size="12" font-weight="700" fill="#0B807C">Ranking #3</text>
  <rect x="258" y="96" width="150" height="26" rx="13" fill="#F3ECE1"/>
  <text x="274" y="114" font-size="12" font-weight="600" fill="#8B93A3">12.4K visits/mo</text>

  <rect x="126" y="148" width="420" height="18" rx="9" fill="#E9E2D6"/>
  <rect x="126" y="178" width="330" height="12" rx="6" fill="#F0EAE0"/>

  <g fill="#F0EAE0">
    <rect x="126" y="222" width="508" height="10" rx="5"/>
    <rect x="126" y="246" width="480" height="10" rx="5"/>
    <rect x="126" y="270" width="500" height="10" rx="5"/>
  </g>

  <!-- inserted link line -->
  <rect class="glowpulse" x="118" y="296" width="524" height="34" rx="10" fill="#0EA5A0" opacity="0.12"/>
  <rect x="126" y="306" width="180" height="12" rx="6" fill="#F0EAE0"/>
  <rect x="316" y="304" width="168" height="16" rx="8" fill="#0EA5A0"/>
  <text x="330" y="317" font-size="11.5" font-weight="700" fill="#FFFFFF">yoursite.com ↗</text>
  <rect x="494" y="306" width="120" height="12" rx="6" fill="#F0EAE0"/>

  <g fill="#F0EAE0">
    <rect x="126" y="352" width="508" height="10" rx="5"/>
    <rect x="126" y="376" width="460" height="10" rx="5"/>
    <rect x="126" y="400" width="496" height="10" rx="5"/>
    <rect x="126" y="424" width="300" height="10" rx="5"/>
  </g>

  <!-- chips -->
  <g class="bob">
    <rect x="470" y="42" width="196" height="48" rx="24" fill="#FFFFFF" stroke="#EAE0D2"/>
    <circle cx="498" cy="66" r="12" fill="#E5F7F1"/>
    <path d="M492 66l4 4 8-8" stroke="#0B807C" stroke-width="2.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="520" y="71" font-size="12.5" font-weight="700" fill="#16192A">Indexed in 6 days</text>
  </g>
  <g class="bob2">
    <rect x="52" y="452" width="220" height="48" rx="24" fill="#16192A"/>
    <text x="76" y="481" font-size="12.5" font-weight="700" fill="#5EEAD4">Authority passing → you</text>
  </g>
</svg>
