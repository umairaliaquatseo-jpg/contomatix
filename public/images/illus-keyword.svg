<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" font-family="Inter, -apple-system, sans-serif">
  <style>
    .barGrow { animation: grow 1.2s cubic-bezier(0.22,0.9,0.35,1) forwards; transform-box: fill-box; transform-origin: left; transform: scaleX(0); }
    .b1 { animation-delay: 0.3s; } .b2 { animation-delay: 0.45s; } .b3 { animation-delay: 0.6s; } .b4 { animation-delay: 0.75s; } .b5 { animation-delay: 0.9s; }
    .bob { animation: bob 4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .blink { animation: blink 1.1s step-end infinite; }
    @keyframes grow { to { transform: scaleX(1); } }
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
  <rect width="760" height="560" fill="#FDFAF5"/>

  <!-- search bar -->
  <rect x="110" y="64" width="540" height="58" rx="29" fill="#FFFFFF" stroke="#EAE0D2"/>
  <circle cx="146" cy="93" r="11" fill="none" stroke="#0EA5A0" stroke-width="2.6"/>
  <line x1="154" y1="101" x2="163" y2="110" stroke="#0EA5A0" stroke-width="2.6" stroke-linecap="round"/>
  <text x="182" y="99" font-size="15" font-weight="600" fill="#16192A">best link building agency</text>
  <rect class="blink" x="398" y="80" width="2.4" height="26" fill="#0EA5A0"/>

  <!-- results card -->
  <rect x="110" y="150" width="540" height="350" rx="18" fill="#FFFFFF" stroke="#EAE0D2"/>
  <text x="140" y="192" font-size="14" font-weight="700" fill="#16192A">Keyword opportunities</text>
  <text x="510" y="192" font-size="11.5" font-weight="700" fill="#8B93A3">VOLUME · KD</text>

  <g font-size="13" fill="#16192A">
    <text x="140" y="238">link building services</text>
    <rect x="360" y="226" width="180" height="14" rx="7" fill="#F3ECE1"/>
    <rect class="barGrow b1" x="360" y="226" width="158" height="14" rx="7" fill="#0EA5A0"/>
    <text x="556" y="238" font-weight="700" fill="#0B807C">8.1K</text>

    <text x="140" y="286">buy niche edits</text>
    <rect x="360" y="274" width="180" height="14" rx="7" fill="#F3ECE1"/>
    <rect class="barGrow b2" x="360" y="274" width="122" height="14" rx="7" fill="#14B8A6"/>
    <text x="556" y="286" font-weight="700" fill="#0B807C">4.6K</text>

    <text x="140" y="334">guest posting agency</text>
    <rect x="360" y="322" width="180" height="14" rx="7" fill="#F3ECE1"/>
    <rect class="barGrow b3" x="360" y="322" width="100" height="14" rx="7" fill="#F59E0B"/>
    <text x="556" y="334" font-weight="700" fill="#C77F08">3.2K</text>

    <text x="140" y="382">saas seo agency</text>
    <rect x="360" y="370" width="180" height="14" rx="7" fill="#F3ECE1"/>
    <rect class="barGrow b4" x="360" y="370" width="84" height="14" rx="7" fill="#F59E0B"/>
    <text x="556" y="382" font-weight="700" fill="#C77F08">2.4K</text>

    <text x="140" y="430">off page seo checklist</text>
    <rect x="360" y="418" width="180" height="14" rx="7" fill="#F3ECE1"/>
    <rect class="barGrow b5" x="360" y="418" width="64" height="14" rx="7" fill="#F472B6"/>
    <text x="556" y="430" font-weight="700" fill="#B9456A">1.8K</text>
  </g>

  <rect x="140" y="454" width="200" height="30" rx="15" fill="#F3ECE1"/>
  <text x="162" y="474" font-size="12" font-weight="700" fill="#565E6E">+ 41 more opportunities</text>

  <g class="bob">
    <rect x="486" y="128" width="196" height="46" rx="23" fill="#16192A"/>
    <text x="508" y="157" font-size="12.5" font-weight="700" fill="#5EEAD4">🎯 Gap: 40+ keywords</text>
  </g>
</svg>
