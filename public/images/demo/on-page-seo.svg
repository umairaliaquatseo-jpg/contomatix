<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="Inter, -apple-system, sans-serif">
  <style>
    .flow { stroke-dasharray: 6 8; animation: flow 1.4s linear infinite; }
    .pop  { opacity: 0; animation: pop 6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .p2 { animation-delay: 1.2s; } .p3 { animation-delay: 2.4s; } .p4 { animation-delay: 3.6s; }
    .bob { animation: bob 3.8s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .rise { stroke-dasharray: 1; stroke-dashoffset: 1; animation: rise 6s ease-in-out infinite; }
    .beat { animation: beat 2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    @keyframes flow { to { stroke-dashoffset: -28; } }
    @keyframes pop { 0%,8% { opacity: 0; transform: scale(0.85); } 16%,86% { opacity: 1; transform: scale(1); } 95%,100% { opacity: 0; } }
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes rise { 0%,25% { stroke-dashoffset: 1; } 70%,88% { stroke-dashoffset: 0; } 100% { stroke-dashoffset: 0; } }
    @keyframes beat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }
  </style>
  <rect width="960" height="420" fill="#FDFAF5"/>
  <text x="48" y="64" font-size="19" font-weight="700" fill="#16192A">How on-page SEO works</text>
  <text x="48" y="88" font-size="13" fill="#8B93A3">Audit → fix structure → internal links → score up</text>

  <g class="pop ">
    <rect x="48" y="130" width="190" height="132" rx="14" fill="#FFFFFF" stroke="#EAE0D2"/>
    <text x="70" y="162" font-size="12.5" fill="#8B93A3">1 · Full page audit</text>
    <rect x="70" y="176" width="126" height="22" rx="11" fill="#E5F7F1"/>
       <text x="80" y="191" font-size="11.5" fill="#0B807C">titles &amp; metas</text>
<rect x="70" y="204" width="146" height="22" rx="11" fill="#E5F7F1"/>
       <text x="80" y="219" font-size="11.5" fill="#0B807C">header structure</text>
<rect x="70" y="232" width="126" height="22" rx="11" fill="#E5F7F1"/>
       <text x="80" y="247" font-size="11.5" fill="#0B807C">content depth</text>
  </g>
  <path class="flow" d="M246 196 h60" stroke="#D8CBB8" stroke-width="2.5" fill="none"/>
  <g class="pop p2">
    <rect x="314" y="130" width="190" height="132" rx="14" fill="#FFFFFF" stroke="#EAE0D2"/>
    <text x="336" y="162" font-size="12.5" fill="#8B93A3">2 · Fixes applied</text>
    <circle cx="352" cy="196" r="13" fill="#E5F7F1"/>
       <path d="M345 196l5 4 9 -8" stroke="#0B807C" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
       <text x="374" y="200" font-size="12" fill="#16192A"><title> optimized</text>
<circle cx="352" cy="232" r="13" fill="#E5F7F1"/>
       <path d="M345 232l5 4 9 -8" stroke="#0B807C" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
       <text x="374" y="236" font-size="12" fill="#16192A"><h1> one clear</text>
  </g>
  <path class="flow" d="M512 196 h60" stroke="#D8CBB8" stroke-width="2.5" fill="none"/>
  <g class="pop p3">
    <rect x="580" y="130" width="150" height="132" rx="14" fill="#FFFFFF" stroke="#EAE0D2"/>
    <text x="602" y="162" font-size="12.5" fill="#8B93A3">3 · Internal linking</text>
    <g class="beat">
      <circle cx="637" cy="208" r="17" fill="none" stroke="#0EA5A0" stroke-width="4"/>
      <circle cx="669" cy="208" r="17" fill="none" stroke="#F5A623" stroke-width="4"/>
    </g>
    <text x="602" y="252" font-size="11.5" fill="#8B93A3">Money pages boosted</text>
  </g>
  <path class="flow" d="M738 196 h58" stroke="#D8CBB8" stroke-width="2.5" fill="none"/>

  <g class="pop p4">
    <rect x="804" y="110" width="118" height="172" rx="14" fill="#FFFFFF" stroke="#EAE0D2"/>
    <text x="822" y="140" font-size="12.5" fill="#8B93A3">4 · SEO score</text>
    <path class="rise" pathLength="1" d="M822 250 C 840 244, 850 226, 862 210 C 876 190, 888 172, 906 156" fill="none" stroke="#0EA5A0" stroke-width="3.5" stroke-linecap="round"/>
    <g class="bob">
      <rect x="846" y="238" width="64" height="24" rx="12" fill="#0EA5A0"/>
      <text x="856" y="254" font-size="11" font-weight="700" fill="#FFFFFF">96/100</text>
    </g>
  </g>

  <g class="bob">
    <rect x="48" y="316" width="874" height="56" rx="14" fill="#FFFFFF" stroke="#EAE0D2"/>
    <circle cx="86" cy="344" r="5" fill="#34D399"/>
    <text x="104" y="349" font-size="13" fill="#565E6E">Live: 14 pages optimized · 96/100 avg. on-page score</text>
  </g>
</svg>
