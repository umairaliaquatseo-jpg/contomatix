<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" font-family="Inter, -apple-system, sans-serif">
  <style>
    .bob { animation: bob 4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .bob2 { animation: bob 4.6s ease-in-out 0.7s infinite; transform-box: fill-box; transform-origin: center; }
    .fly { animation: fly 5s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
    @keyframes fly { 0% { transform: translate(0,0) rotate(0deg); } 50% { transform: translate(14px,-16px) rotate(-4deg); } 100% { transform: translate(0,0) rotate(0deg); } }
  </style>

  <!-- envelope -->
  <g class="bob">
    <rect x="130" y="150" width="260" height="176" rx="18" fill="#FFFFFF" stroke="#EAE0D2"/>
    <path d="M138 164 L260 256 L382 164" fill="none" stroke="#0EA5A0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- paper plane -->
  <g class="fly">
    <path d="M310 90 L420 60 L360 170 L340 130 L300 140 Z" fill="#F59E0B"/>
    <path d="M340 130 L360 170 L370 140 Z" fill="#C77F08"/>
  </g>

  <!-- floating dots/nodes -->
  <circle class="bob2" cx="96" cy="120" r="10" fill="#14B8A6"/>
  <circle class="bob" cx="440" cy="230" r="8" fill="#F472B6"/>
  <circle class="bob2" cx="120" cy="330" r="7" fill="#F59E0B"/>
  <circle class="bob" cx="410" cy="330" r="9" fill="#0EA5A0"/>

  <!-- subtle rings -->
  <circle cx="260" cy="238" r="150" fill="none" stroke="#EAE0D2" stroke-width="1.4" stroke-dasharray="5 8" opacity="0.7"/>
</svg>
