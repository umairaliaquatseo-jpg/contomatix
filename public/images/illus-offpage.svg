<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" font-family="Inter, -apple-system, sans-serif">
  <style>
    .orbit { animation: orbit 26s linear infinite; transform-origin: 380px 280px; }
    .orbit-r { animation: orbitr 34s linear infinite; transform-origin: 380px 280px; }
    .unspin { animation: unspin 26s linear infinite; transform-box: fill-box; transform-origin: center; }
    .unspin-r { animation: unspinr 34s linear infinite; transform-box: fill-box; transform-origin: center; }
    @keyframes orbit { to { transform: rotate(360deg); } }
    @keyframes orbitr { to { transform: rotate(-360deg); } }
    @keyframes unspin { to { transform: rotate(-360deg); } }
    @keyframes unspinr { to { transform: rotate(360deg); } }
  </style>
  <rect width="760" height="560" fill="#FDFAF5"/>

  <circle cx="380" cy="280" r="150" fill="none" stroke="#EAE0D2" stroke-width="1.6" stroke-dasharray="5 7"/>
  <circle cx="380" cy="280" r="215" fill="none" stroke="#EFE7DA" stroke-width="1.4" stroke-dasharray="4 8"/>

  <!-- globe -->
  <circle cx="380" cy="280" r="86" fill="#0EA5A0"/>
  <circle cx="380" cy="280" r="86" fill="none" stroke="#0B807C" stroke-width="2"/>
  <path d="M294 280h172M380 194c30 26 46 54 46 86s-16 60-46 86c-30-26-46-54-46-86s16-60 46-86z" stroke="#FFFFFF" stroke-width="2.4" fill="none" opacity="0.85"/>
  <text x="380" y="398" font-size="14" font-weight="700" fill="#16192A" text-anchor="middle">Your brand</text>

  <!-- orbiting chips (inner) -->
  <g class="orbit">
    <g class="unspin" transform="translate(380,130)">
      <rect x="-62" y="-20" width="124" height="40" rx="20" fill="#FFFFFF" stroke="#EAE0D2"/>
      <text x="0" y="5" font-size="12" font-weight="700" fill="#16192A" text-anchor="middle">🔗 Backlinks</text>
    </g>
    <g class="unspin" transform="translate(530,280)">
      <rect x="-58" y="-20" width="116" height="40" rx="20" fill="#FFFFFF" stroke="#EAE0D2"/>
      <text x="0" y="5" font-size="12" font-weight="700" fill="#16192A" text-anchor="middle">💬 Mentions</text>
    </g>
    <g class="unspin" transform="translate(380,430)">
      <rect x="-56" y="-20" width="112" height="40" rx="20" fill="#FFFFFF" stroke="#EAE0D2"/>
      <text x="0" y="5" font-size="12" font-weight="700" fill="#16192A" text-anchor="middle">📍 Citations</text>
    </g>
    <g class="unspin" transform="translate(230,280)">
      <rect x="-56" y="-20" width="112" height="40" rx="20" fill="#FFFFFF" stroke="#EAE0D2"/>
      <text x="0" y="5" font-size="12" font-weight="700" fill="#16192A" text-anchor="middle">📰 Digital PR</text>
    </g>
  </g>

  <!-- outer counter-orbit accents -->
  <g class="orbit-r">
    <g class="unspin-r" transform="translate(380,65)"><circle r="9" fill="#F59E0B"/></g>
    <g class="unspin-r" transform="translate(595,280)"><circle r="7" fill="#F472B6"/></g>
    <g class="unspin-r" transform="translate(380,495)"><circle r="8" fill="#14B8A6"/></g>
    <g class="unspin-r" transform="translate(165,280)"><circle r="6" fill="#F59E0B"/></g>
  </g>
</svg>
