<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" font-family="Inter, -apple-system, sans-serif">
  <style>
    .march { animation: march 1.8s linear infinite; }
    .float-a { animation: bob 3.6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .float-b { animation: bob 4.2s ease-in-out 0.6s infinite; transform-box: fill-box; transform-origin: center; }
    .float-c { animation: bob 3.9s ease-in-out 1.1s infinite; transform-box: fill-box; transform-origin: center; }
    .sail { animation: sail 6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    @keyframes march { to { stroke-dashoffset: -28; } }
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes sail { 0%,100% { transform: translateX(0); } 50% { transform: translateX(10px); } }
  </style>
  <rect width="760" height="560" fill="#FDFAF5"/>

  <!-- route lines from ports to the ship -->
  <g stroke="#D9CDBB" stroke-width="2" fill="none">
    <path d="M380 280 C 300 220, 240 190, 160 150"/>
    <path d="M380 280 C 470 210, 530 180, 600 140"/>
    <path d="M380 280 C 280 330, 220 370, 150 420"/>
    <path d="M380 280 C 480 340, 550 380, 615 415"/>
  </g>
  <g class="march" stroke="#0EA5A0" stroke-width="2.5" fill="none" stroke-dasharray="7 7">
    <path d="M160 150 C 240 190, 300 220, 380 280"/>
    <path d="M600 140 C 530 180, 470 210, 380 280"/>
  </g>

  <!-- container ship (center) -->
  <g class="sail">
    <rect x="250" y="252" width="260" height="30" rx="6" fill="#16192A"/>
    <path d="M250 282 L280 306 L480 306 L510 282 Z" fill="#16192A"/>
    <rect x="270" y="228" width="34" height="24" rx="3" fill="#0EA5A0"/>
    <rect x="310" y="228" width="34" height="24" rx="3" fill="#F59E0B"/>
    <rect x="350" y="228" width="34" height="24" rx="3" fill="#F472B6"/>
    <rect x="390" y="228" width="34" height="24" rx="3" fill="#0EA5A0"/>
    <rect x="430" y="228" width="34" height="24" rx="3" fill="#F59E0B"/>
    <rect x="296" y="204" width="16" height="24" rx="2" fill="#565E6E"/>
  </g>
  <text x="380" y="336" font-size="13" font-weight="700" fill="#16192A" text-anchor="middle">Your fleet / brand</text>

  <!-- port / destination cards -->
  <g class="float-b">
    <rect x="62" y="106" width="196" height="72" rx="14" fill="#FFFFFF" stroke="#EAE0D2"/>
    <circle cx="92" cy="142" r="12" fill="#E5F7F1"/>
    <circle cx="92" cy="142" r="5" fill="#0EA5A0"/>
    <text x="114" y="138" font-size="13.5" font-weight="600" fill="#16192A">Port of Rotterdam</text>
    <rect x="114" y="146" width="72" height="20" rx="10" fill="#E5F7F1"/>
    <text x="122" y="160" font-size="11" font-weight="700" fill="#0B807C">RFQ +12</text>
  </g>
  <g class="float-c">
    <rect x="512" y="96" width="196" height="72" rx="14" fill="#FFFFFF" stroke="#EAE0D2"/>
    <circle cx="542" cy="132" r="12" fill="#FDF3E2"/>
    <circle cx="542" cy="132" r="5" fill="#F59E0B"/>
    <text x="564" y="128" font-size="13.5" font-weight="600" fill="#16192A">Port of Singapore</text>
    <rect x="564" y="136" width="72" height="20" rx="10" fill="#FDF3E2"/>
    <text x="572" y="150" font-size="11" font-weight="700" fill="#C77F08">RFQ +9</text>
  </g>
  <g class="float-a">
    <rect x="52" y="384" width="196" height="72" rx="14" fill="#FFFFFF" stroke="#EAE0D2"/>
    <circle cx="82" cy="420" r="12" fill="#FCE9F3"/>
    <circle cx="82" cy="420" r="5" fill="#F472B6"/>
    <text x="104" y="416" font-size="13.5" font-weight="600" fill="#16192A">Port of Houston</text>
    <rect x="104" y="424" width="72" height="20" rx="10" fill="#FCE9F3"/>
    <text x="112" y="438" font-size="11" font-weight="700" fill="#B9456A">RFQ +6</text>
  </g>
  <g class="float-b">
    <rect x="520" y="382" width="196" height="72" rx="14" fill="#FFFFFF" stroke="#EAE0D2"/>
    <circle cx="550" cy="418" r="12" fill="#E5F7F1"/>
    <circle cx="550" cy="418" r="5" fill="#0EA5A0"/>
    <text x="572" y="414" font-size="13.5" font-weight="600" fill="#16192A">Port of Hamburg</text>
    <rect x="572" y="422" width="72" height="20" rx="10" fill="#E5F7F1"/>
    <text x="580" y="436" font-size="11" font-weight="700" fill="#0B807C">RFQ +14</text>
  </g>

  <!-- floating stat chip -->
  <g class="float-a">
    <rect x="486" y="486" width="212" height="48" rx="24" fill="#FFFFFF" stroke="#EAE0D2"/>
    <circle cx="514" cy="510" r="13" fill="#E5F7F1"/>
    <path d="M508 510l4 4 8-8" stroke="#0B807C" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="538" y="515" font-size="13" font-weight="600" fill="#16192A">+41 qualified RFQs this quarter</text>
  </g>
</svg>
