  <text x="92" y="140" font-size="12.5" fill="#8B93A3">December · sent automatically</text>
  <rect x="428" y="100" width="100" height="30" rx="15" fill="#E5F7F1"/>
  <text x="446" y="120" font-size="12.5" font-weight="600" fill="#0B807C">On track</text>

  <!-- bars -->
  <g>
    <rect x="92"  y="330" width="42" height="90"  rx="8" fill="#EFE7DA"/>
    <rect x="150" y="300" width="42" height="120" rx="8" fill="#EFE7DA"/>
    <rect x="208" y="318" width="42" height="102" rx="8" fill="#EFE7DA"/>
    <rect x="266" y="270" width="42" height="150" rx="8" fill="url(#rbar)"/>
    <rect x="324" y="242" width="42" height="178" rx="8" fill="url(#rbar)"/>
    <rect x="382" y="206" width="42" height="214" rx="8" fill="url(#rbar)"/>
    <rect x="440" y="170" width="42" height="250" rx="8" fill="#F59E0B"/>
  </g>
  <line x1="92" y1="420" x2="528" y2="420" stroke="#EAE0D2" stroke-width="1.5"/>
  <g font-size="11" fill="#8B93A3">
    <text x="100" y="444">Jun</text><text x="158" y="444">Jul</text><text x="214" y="444">Aug</text>
    <text x="272" y="444">Sep</text><text x="332" y="444">Oct</text><text x="388" y="444">Nov</text><text x="446" y="444">Dec</text>
  </g>
  <!-- trend arrow -->
  <path d="M113 300 C 220 280, 300 240, 461 148" fill="none" stroke="#16192A" stroke-width="2.5" stroke-dasharray="1 0" opacity="0.85"/>
  <path d="M448 146l14-4 -2 15" fill="none" stroke="#16192A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- floating cards -->
  <rect x="512" y="196" width="196" height="84" rx="16" fill="#FFFFFF" stroke="#EAE0D2"/>
  <text x="536" y="228" font-size="12.5" fill="#8B93A3">Traffic value</text>
