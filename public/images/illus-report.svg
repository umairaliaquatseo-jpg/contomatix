  <text x="644" y="255" font-size="11.5" font-weight="700" fill="#0B807C">+64%</text>

  <rect x="524" y="312" width="196" height="98" rx="16" fill="#16192A"/>
  <text x="548" y="344" font-size="12.5" fill="#9AA3B8">Goal completions</text>
  <text x="548" y="376" font-size="24" font-weight="700" fill="#FFFFFF">1,208</text>
  <path d="M548 392 l18 -8 14 5 20 -12 16 6 22 -14" stroke="#14B8A6" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <rect x="540" y="440" width="180" height="52" rx="26" fill="#FFFFFF" stroke="#EAE0D2"/>
  <circle cx="568" cy="466" r="13" fill="#FDF3E2"/>
  <text x="561" y="472" font-size="14">📈</text>
  <text x="592" y="471" font-size="13" font-weight="600" fill="#16192A">Rankings up 4.2×</text>
